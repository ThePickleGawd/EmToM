# @package _global_

# Multi-agent config supporting 5 humanoid agents
defaults:
  - /habitat: habitat_config_base
  - /habitat_conf/habitat_agent@habitat.simulator.agents.agent_0: rgbd_head_rgbd_arm_agent_vis
  - /habitat_conf/habitat_agent@habitat.simulator.agents.agent_1: rgbd_head_rgbd_arm_agent_vis
  - /habitat_conf/habitat_agent@habitat.simulator.agents.agent_2: rgbd_head_rgbd_arm_agent_vis
  - /habitat_conf/habitat_agent@habitat.simulator.agents.agent_3: rgbd_head_rgbd_arm_agent_vis
  - /habitat_conf/habitat_agent@habitat.simulator.agents.agent_4: rgbd_head_rgbd_arm_agent_vis
  - /habitat_conf/dataset: collaboration_hssd

  - /habitat/task/lab_sensors:
    - humanoid_detector_sensor
  - _self_

habitat:
  gym:
    obs_keys:
      # Agent 0
      - agent_0_third_rgb
      - agent_0_articulated_agent_arm_depth
      - agent_0_articulated_agent_arm_rgb
      - agent_0_articulated_agent_arm_panoptic
      - agent_0_head_depth
      - agent_0_head_rgb
      - agent_0_head_panoptic
      - agent_0_relative_resting_position
      - agent_0_joint
      - agent_0_ee_pos
      - agent_0_is_holding
      - agent_0_humanoid_detector_sensor

      # Agent 1
      - agent_1_third_rgb
      - agent_1_articulated_agent_arm_depth
      - agent_1_articulated_agent_arm_rgb
      - agent_1_articulated_agent_arm_panoptic
      - agent_1_head_depth
      - agent_1_head_rgb
      - agent_1_head_panoptic
      - agent_1_relative_resting_position
      - agent_1_joint
      - agent_1_ee_pos
      - agent_1_is_holding
      - agent_1_humanoid_detector_sensor

      # Agent 2
      - agent_2_third_rgb
      - agent_2_articulated_agent_arm_depth
      - agent_2_articulated_agent_arm_rgb
      - agent_2_articulated_agent_arm_panoptic
      - agent_2_head_depth
      - agent_2_head_rgb
      - agent_2_head_panoptic
      - agent_2_relative_resting_position
      - agent_2_joint
      - agent_2_ee_pos
      - agent_2_is_holding
      - agent_2_humanoid_detector_sensor

      # Agent 3
      - agent_3_third_rgb
      - agent_3_articulated_agent_arm_depth
      - agent_3_articulated_agent_arm_rgb
      - agent_3_articulated_agent_arm_panoptic
      - agent_3_head_depth
      - agent_3_head_rgb
      - agent_3_head_panoptic
      - agent_3_relative_resting_position
      - agent_3_joint
      - agent_3_ee_pos
      - agent_3_is_holding
      - agent_3_humanoid_detector_sensor

      # Agent 4
      - agent_4_third_rgb
      - agent_4_articulated_agent_arm_depth
      - agent_4_articulated_agent_arm_rgb
      - agent_4_articulated_agent_arm_panoptic
      - agent_4_head_depth
      - agent_4_head_rgb
      - agent_4_head_panoptic
      - agent_4_relative_resting_position
      - agent_4_joint
      - agent_4_ee_pos
      - agent_4_is_holding
      - agent_4_humanoid_detector_sensor

  task:
    lab_sensors:
      humanoid_detector_sensor:
        return_image: False
        is_return_image_bbox: False
  environment:
    max_episode_steps: 20000
  simulator:
    type: CollaborationSim-v0
    additional_object_paths:
      - "data/objects/ycb/configs/"
      - "data/objects_ovmm/train_val/ai2thorhab/configs/objects"
      - "data/objects_ovmm/train_val/amazon_berkeley/configs"
      - "data/objects_ovmm/train_val/google_scanned/configs"
      - "data/objects_ovmm/train_val/hssd/configs/objects"
    concur_render: False
    auto_sleep: True
    agents:
      agent_0:
        radius: 0.3
        articulated_agent_urdf: 'data/humanoids/humanoid_data/female_1/female_1.urdf'
        articulated_agent_type: KinematicHumanoid
        motion_data_path: "data/humanoids/humanoid_data/female_1/female_1_motion_data_smplx.pkl"
      agent_1:
        radius: 0.3
        articulated_agent_urdf: 'data/humanoids/humanoid_data/female_2/female_2.urdf'
        articulated_agent_type: KinematicHumanoid
        motion_data_path: "data/humanoids/humanoid_data/female_2/female_2_motion_data_smplx.pkl"
      agent_2:
        radius: 0.3
        articulated_agent_urdf: 'data/humanoids/humanoid_data/male_0/male_0.urdf'
        articulated_agent_type: KinematicHumanoid
        motion_data_path: "data/humanoids/humanoid_data/male_0/male_0_motion_data_smplx.pkl"
      agent_3:
        radius: 0.3
        articulated_agent_urdf: 'data/humanoids/humanoid_data/male_1/male_1.urdf'
        articulated_agent_type: KinematicHumanoid
        motion_data_path: "data/humanoids/humanoid_data/male_1/male_1_motion_data_smplx.pkl"
      agent_4:
        radius: 0.3
        articulated_agent_urdf: 'data/humanoids/humanoid_data/female_0/female_0.urdf'
        articulated_agent_type: KinematicHumanoid
        motion_data_path: "data/humanoids/humanoid_data/female_0/female_0_motion_data_smplx.pkl"
    kinematic_mode: True
    step_physics: False
    habitat_sim_v0:
      allow_sliding: True
      enable_physics: True
