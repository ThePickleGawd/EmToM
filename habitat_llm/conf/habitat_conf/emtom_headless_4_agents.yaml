# @package _global_

# HEADLESS: 4 Spot robots WITHOUT visual sensors - for fast task generation
defaults:
  - /habitat: habitat_config_base
  - /habitat_conf/habitat_agent@habitat.simulator.agents.agent_0: minimal_no_visual
  - /habitat_conf/habitat_agent@habitat.simulator.agents.agent_1: minimal_no_visual
  - /habitat_conf/habitat_agent@habitat.simulator.agents.agent_2: minimal_no_visual
  - /habitat_conf/habitat_agent@habitat.simulator.agents.agent_3: minimal_no_visual
  - /habitat_conf/dataset: collaboration_hssd
  - _self_

habitat:
  gym:
    obs_keys:
      - agent_0_relative_resting_position
      - agent_0_joint
      - agent_0_ee_pos
      - agent_0_is_holding
      - agent_1_relative_resting_position
      - agent_1_joint
      - agent_1_ee_pos
      - agent_1_is_holding
      - agent_2_relative_resting_position
      - agent_2_joint
      - agent_2_ee_pos
      - agent_2_is_holding
      - agent_3_relative_resting_position
      - agent_3_joint
      - agent_3_ee_pos
      - agent_3_is_holding

  task:
    lab_sensors: {}
  environment:
    max_episode_steps: 1000
  simulator:
    type: CollaborationSim-v0
    additional_object_paths:
      - "data/objects/ycb/configs/"
      - "data/objects_ovmm/train_val/ai2thorhab/configs/objects"
      - "data/objects_ovmm/train_val/amazon_berkeley/configs"
      - "data/objects_ovmm/train_val/google_scanned/configs"
      - "data/objects_ovmm/train_val/hssd/configs/objects"
    concur_render: False
    auto_sleep: True
    agents:
      agent_0:
        radius: 0.3
        articulated_agent_urdf: ./data/robots/hab_spot_arm/urdf/hab_spot_arm.urdf
        articulated_agent_type: SpotRobot
        joint_start_noise: 0.0
        is_set_start_state: True
        start_position: [0, 0, 0]
        start_rotation: [0, 0, 0, 1]
      agent_1:
        radius: 0.3
        articulated_agent_urdf: ./data/robots/hab_spot_arm/urdf/hab_spot_arm.urdf
        articulated_agent_type: SpotRobot
        joint_start_noise: 0.0
        is_set_start_state: True
        start_position: [1, 0, 0]
        start_rotation: [0, 0, 0, 1]
      agent_2:
        radius: 0.3
        articulated_agent_urdf: ./data/robots/hab_spot_arm/urdf/hab_spot_arm.urdf
        articulated_agent_type: SpotRobot
        joint_start_noise: 0.0
        is_set_start_state: True
        start_position: [2, 0, 0]
        start_rotation: [0, 0, 0, 1]
      agent_3:
        radius: 0.3
        articulated_agent_urdf: ./data/robots/hab_spot_arm/urdf/hab_spot_arm.urdf
        articulated_agent_type: SpotRobot
        joint_start_noise: 0.0
        is_set_start_state: True
        start_position: [3, 0, 0]
        start_rotation: [0, 0, 0, 1]
    kinematic_mode: True
    step_physics: False
    habitat_sim_v0:
      allow_sliding: True
      enable_physics: True
