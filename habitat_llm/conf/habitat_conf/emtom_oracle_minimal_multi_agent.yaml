# @package _global_

# Minimal multi-agent config WITHOUT visual sensors - for fast task generation
# Uses oracle perception (ground truth), no need for RGB/depth/panoptic
defaults:
  - /habitat: habitat_config_base
  - /habitat_conf/habitat_agent@habitat.simulator.agents.agent_0: minimal_no_visual
  - /habitat_conf/habitat_agent@habitat.simulator.agents.agent_1: minimal_no_visual
  - /habitat_conf/dataset: collaboration_hssd

  - /habitat/task/lab_sensors:
    - humanoid_detector_sensor
  - _self_

habitat:
  gym:
    obs_keys:
      # Agent 0 - proprioceptive only
      - agent_0_relative_resting_position
      - agent_0_joint
      - agent_0_ee_pos
      - agent_0_is_holding
      - agent_0_humanoid_detector_sensor
      # Agent 1 - proprioceptive only
      - agent_1_relative_resting_position
      - agent_1_joint
      - agent_1_ee_pos
      - agent_1_is_holding
      - agent_1_humanoid_detector_sensor
  task:
    lab_sensors:
      humanoid_detector_sensor:
        return_image: False
        is_return_image_bbox: False
  environment:
    max_episode_steps: 20000
  simulator:
    type: CollaborationSim-v0
    additional_object_paths:
      - "data/objects/ycb/configs/"
      - "data/objects_ovmm/train_val/ai2thorhab/configs/objects"
      - "data/objects_ovmm/train_val/amazon_berkeley/configs"
      - "data/objects_ovmm/train_val/google_scanned/configs"
      - "data/objects_ovmm/train_val/hssd/configs/objects"
    concur_render: False
    auto_sleep: True
    agents:
      agent_0:
        radius: 0.3
        articulated_agent_urdf: ./data/robot_variants/hab_spot_arm/urdf/hab_spot_arm_agent_0_scarlet.urdf
        articulated_agent_type: SpotRobot
        joint_start_noise: 0.0
      agent_1:
        radius: 0.3
        articulated_agent_urdf: ./data/robot_variants/hab_spot_arm/urdf/hab_spot_arm_agent_1_cobalt.urdf
        articulated_agent_type: SpotRobot
        joint_start_noise: 0.0
    kinematic_mode: True
    step_physics: False
    habitat_sim_v0:
      allow_sliding: True
      enable_physics: True
