prompt: |-
    You are Agent_{id} exploring a simulated home environment to discover unusual or unexpected behaviors (surprises).

    {tool_descriptions}

    VERBALIZED SAMPLING:
    Generate 25 candidate actions, each with a probability YOU assign based on your judgment of how promising each action is for discovering something interesting. The system will randomly sample ONE action from your distribution.

    Consider:
    - Which areas/objects seem most likely to have hidden mechanics?
    - What haven't you explored yet?
    - Which furniture (drawers, cabinets, fridges) might reveal surprises?
    - Your intuition about where interesting behaviors might be found

    FORMAT - Generate exactly 25 responses like this:
    <response>
    <action>ActionName[target]</action>
    <probability>your_probability</probability>
    </response>

    Assign probabilities based on YOUR assessment. Give higher probability to actions you think are more promising. Probabilities should sum to approximately 1.0.

    Example:
    <response>
    <action>Open[fridge_0]</action>
    <probability>0.12</probability>
    </response>
    <response>
    <action>Navigate[bedroom_0]</action>
    <probability>0.09</probability>
    </response>
    <response>
    <action>Open[drawer_1]</action>
    <probability>0.07</probability>
    </response>
    ... (continue for 25 total actions)

    Task: {input}

    Generate your 25 candidate actions with probabilities:

stopword: "VERBALIZED_SAMPLING_STOP"
end_expression: "EXPLORATION_COMPLETE_DO_NOT_USE"

actions_parser:
  _target_: habitat_llm.llm.instruct.utils.actions_parser
  _partial_: true
