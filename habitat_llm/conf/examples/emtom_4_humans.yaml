# @package _global_

# EMTOM 4-agent humanoid configuration
defaults:
  - /training@             : base_train
  - /habitat_conf          : oracle_kinematic_multi_agent_4
  - /habitat_conf/task     : rearrange_easy_multi_agent
  - /evaluation: centralized_evaluation_runner_multi_agent
  # Agent 0 actions
  - /habitat/task/actions@habitat.task.actions.agent_0_humanoid_base_velocity: humanoid_base_velocity
  - /habitat/task/actions@habitat.task.actions.agent_0_humanoidjoint_action: humanoidjoint_action
  # Agent 1 actions
  - /habitat/task/actions@habitat.task.actions.agent_1_humanoid_base_velocity: humanoid_base_velocity
  - /habitat/task/actions@habitat.task.actions.agent_1_humanoidjoint_action: humanoidjoint_action
  # Agent 2 actions
  - /habitat/task/actions@habitat.task.actions.agent_2_humanoid_base_velocity: humanoid_base_velocity
  - /habitat/task/actions@habitat.task.actions.agent_2_humanoidjoint_action: humanoidjoint_action
  # Agent 3 actions
  - /habitat/task/actions@habitat.task.actions.agent_3_humanoid_base_velocity: humanoid_base_velocity
  - /habitat/task/actions@habitat.task.actions.agent_3_humanoidjoint_action: humanoidjoint_action
  - /world_model@world_model: gt_graph
  - /trajectory@trajectory : trajectory_logger
  - /agent/@agents.agent_0.config: oracle_rearrange_agent
  - /agent/@agents.agent_1.config: oracle_rearrange_object_states_agent
  - /agent/@agents.agent_2.config: oracle_rearrange_object_states_agent
  - /agent/@agents.agent_3.config: oracle_rearrange_object_states_agent
  - /wandb_conf@                : own
  - override /hydra/output : output
  - _self_

world_model:
  partial_obs: False
agent_asymmetry: False

device      : cuda
instruction : ''
mode: "dataset"
env: habitat
num_runs_per_episode: 1
num_proc: 1
dry_run: False
robot_agent_uid: 0
human_agent_uid: 1

agents:
  agent_0:
    uid: 0
  agent_1:
    uid: 1
  agent_2:
    uid: 2
  agent_3:
    uid: 3

paths:
  results_dir: ${hydra:runtime.output_dir}/results
  epi_result_file_path: "${paths.results_dir}/episode_result_log.csv"
  run_result_file_path: "${paths.results_dir}/run_result_log.csv"
  end_result_file_path: "${paths.results_dir}/end_result_log.csv"

evaluation:
  do_print: True
  save_video: False
  log_data: True
  save_rgb: False
  log_detailed_traces: True
  agents:
    agent_0:
      uid: 0
    agent_1:
      uid: 1
    agent_2:
      uid: 2
    agent_3:
      uid: 3

habitat:
  task:
    pddl_domain_def: fp

hydra:
  job:
    name: 'emtom_4_humans'
    chdir: False
  run:
    dir: outputs/${hydra.job.name}/${now:%Y-%m-%d_%H-%M-%S}-${file_stem:${habitat.dataset.data_path}}
