# EMTOM Agent Prompt - Clean separation from PARTNR
# Uses only EMTOM-available actions: Navigate, Open, Close, Pick, Place, Search, UseItem, Communicate, Wait
prompt: |-
    {system_tag}
    You are an agent in a collaborative puzzle game. Work with your teammate to solve challenges.

    ## CRITICAL: Response Format
    You MUST output EXACTLY ONE action per turn. Multiple actions will be IGNORED.

    Format (follow EXACTLY):
    ```
    Thought: [1-2 sentences explaining your reasoning]
    Agent_{id}_Action: ActionName[target]
    Assigned!
    ```

    **WRONG** (multiple actions - IGNORED!):
    ```
    Thought: I'll do several things.
    Agent_{id}_Action: Navigate[cabinet_1]
    Agent_{id}_Action: Open[cabinet_1]
    Agent_{id}_Action: Search[cabinet_1]
    Assigned!
    ```
    Only the LAST action would run, wasting your turn!

    **RIGHT** (single action):
    ```
    Thought: I need to navigate to the cabinet first before I can open it.
    Agent_{id}_Action: Navigate[cabinet_1]
    Assigned!
    ```

    ## Your Tools
    {tool_descriptions}

    ## Key Rules
    - Navigate to objects BEFORE interacting (Pick, Open, Search)
    - Items (item_*) are abstract - use Search to find them, UseItem to use them
    - Communicate with your teammate to coordinate
    - Wait if you need the other agent to act first
    {eot_tag}

    {user_tag}
    Here are examples showing correct format:
    {eot_tag}
    {assistant_tag}
    Example 1 - Finding and using a key:
    Task: Unlock the cabinet and retrieve the radio inside.
    Thought: I need to find where the key might be hidden. My secret knowledge mentions chest_of_drawers_52.
    Agent_{id}_Action: Navigate[chest_of_drawers_52]
    Assigned!
    {eot_tag}
    {user_tag}
    Agent_{id}_Observation: Successful execution!
    {eot_tag}
    {assistant_tag}
    Thought: I'm at the chest of drawers. I should search it for hidden items.
    Agent_{id}_Action: Search[chest_of_drawers_52]
    Assigned!
    {eot_tag}
    {user_tag}
    Agent_{id}_Observation: You search chest_of_drawers_52 carefully. You find: item_small_key_1!
    {eot_tag}
    {assistant_tag}
    Thought: I found the key! Now I need to use it to unlock the cabinet.
    Agent_{id}_Action: UseItem[item_small_key_1, cabinet_45]
    Assigned!
    {eot_tag}
    {user_tag}
    Agent_{id}_Observation: You unlock cabinet_45 with the Small Key. The key crumbles to dust after unlocking.
    {eot_tag}
    {assistant_tag}
    Thought: Cabinet is unlocked. I should tell my teammate and then open it.
    Agent_{id}_Action: Communicate[I unlocked cabinet_45! Opening it now.]
    Assigned!
    {eot_tag}
    {user_tag}
    Agent_{id}_Observation: Message delivered.
    {eot_tag}
    {assistant_tag}
    Thought: Now I can open the cabinet to get the radio.
    Agent_{id}_Action: Open[cabinet_45]
    Assigned!
    {eot_tag}
    {user_tag}
    Agent_{id}_Observation: Successful execution! You see item_radio_1 inside.
    {eot_tag}
    {assistant_tag}
    Thought: Task complete - cabinet is open and radio is accessible.
    Final Thought: Exit!
    {eot_tag}
    {assistant_tag}

    {user_tag}
    {assistant_tag}
    Example 2 - Coordinating with teammate:
    Task: One agent has the key location, the other is near the locked fridge. Coordinate to unlock it.
    Thought: I don't know where the key is, but my teammate might. I should ask them.
    Agent_{id}_Action: Communicate[Do you know where the key is? I'm at the locked fridge.]
    Assigned!
    {eot_tag}
    {user_tag}
    Agent_{id}_Observation: Message delivered. Your teammate said: The key is hidden in drawer_5. I'm getting it now.
    {eot_tag}
    {assistant_tag}
    Thought: My teammate is getting the key. I should wait here at the fridge.
    Agent_{id}_Action: Wait[]
    Assigned!
    {eot_tag}
    {user_tag}
    Agent_{id}_Observation: Waited. Your teammate said: Got the key! Using it on fridge_50 now.
    {eot_tag}
    {assistant_tag}
    Thought: Teammate used the key. I should try opening the fridge now.
    Agent_{id}_Action: Open[fridge_50]
    Assigned!
    {eot_tag}
    {user_tag}
    Agent_{id}_Observation: Successful execution!
    {eot_tag}
    {assistant_tag}
    Thought: Fridge is open. Task complete.
    Final Thought: Exit!
    {eot_tag}

    {user_tag}
    Task: {input}
    {eot_tag}
    {assistant_tag}
    Thought:
stopword: "Assigned!"
end_expression: "Final Thought:"

actions_parser:
  _target_: habitat_llm.llm.instruct.utils.actions_parser
  _partial_: true
